# Keep the stock prefix: Ctrl-b.
set -g default-terminal "tmux-256color"
set -ga terminal-features ",xterm-ghostty:RGB"
set -ga terminal-features ",xterm-256color:RGB"
set -g focus-events on
set -g escape-time 10
set -g history-limit 100000
set -g mouse on
set -g set-clipboard on

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Status line modeled after the minimal Neovim lualine setup.
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify centre
set -g status-style "bg=#0D0D0D,fg=#C9C9C9"
set -g status-left-length 100
set -g status-left '#[fg=#C9C9C9,bold] #S #[fg=#626462]#{?client_prefix,prefix ,}#[fg=#C9C9C9]#{b:pane_current_path}#[fg=#626462]#(cd "#{pane_current_path}" 2>/dev/null && git branch --show-current 2>/dev/null | sed "s/^/   /") '
set -g status-right-length 80
set -g status-right '#[fg=#626462]#H #[fg=#C9C9C9]%H:%M #[fg=#76946A,bold] '

setw -g window-status-format '#[fg=#626462] #I:#W '
setw -g window-status-current-format '#[fg=#C9C9C9,bg=#1D1D1D,bold] #I:#W '
setw -g window-status-separator ''

setw -g mode-keys vi

bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"
bind Escape copy-mode

bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi q send-keys -X cancel
